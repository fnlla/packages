name: Build Composer Repository

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 3.0.4 or v3.0.4"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: zip

      - name: Build repository artifacts
        run: php tools/build-composer-repository.php --version="${{ inputs.version }}" --dist-base-url="https://raw.githubusercontent.com/fnlla/packages/main/repository"

      - name: Commit repository artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add repository
          git commit -m "build(repository): refresh composer metadata for ${{ inputs.version }}"
          git push
